baseURL: "https://lorenzo-biasi.github.io/"
title: Lorenzo Biasi
paginate: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

params:
  env: production
  title: Lorenzo Biasi
  description: "Personal website of Lorenzo Biasi"
  keywords: [Blog, Portfolio]
  author: Lorenzo Biasi
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  profileMode:
    enabled: true
    title: "Lorenzo Biasi"
    subtitle: "Welcome to my personal page"
    imageUrl: ""
    imageWidth: 120
    imageHeight: 120
    buttons:
      - name: About
        url: about
      - name: Blog
        url: posts

  socialIcons:
    - name: github
      url: "https://github.com/lorenzo-biasi"
    - name: linkedin
      url: "https://linkedin.com/in/lorenzo-bi"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    noClasses: false
